name: Build Desktop Application (Windows & Mac)

on:
  push:
    branches: [ "main" ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Scarica il codice dal repository
        uses: actions/checkout@v4
      
      - name: Configura Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Installa le dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Reset Database per la Release
        run: |
          if (Test-Path db.sqlite3) { Remove-Item db.sqlite3 }
          python manage.py migrate
          python -c "import os, django; \
          os.environ.setdefault('DJANGO_SETTINGS_MODULE', 'core.settings'); \
          django.setup(); \
          from django.contrib.auth.models import User; \
          User.objects.create_superuser('admin', 'admin@example.com', 'admin') \
          if not User.objects.filter(username='admin').exists() else None"
        env:
          DJANGO_SETTINGS_MODULE: core.settings

      - name: Build Windows EXE
        run: |
          pyinstaller --noconsole --onefile --icon=assets/icon.ico --paths . `
            --collect-submodules anagrafica `
            --collect-submodules servizi `
            --collect-submodules appuntamenti `
            --collect-submodules cassa `
            --collect-submodules core `
            --collect-submodules gui `
            --add-data "db.sqlite3;." `
            --add-data "assets;assets" `
            --name "GestionaleCentroEstetico" `
            main.py

      - name: Carica il pacchetto Windows
        uses: actions/upload-artifact@v4
        with:
          name: Gestionale-Windows-Portable
          path: dist/GestionaleCentroEstetico.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Reset Database per la Release
        run: |
          rm -f db.sqlite3
          python manage.py migrate
          python -c "import os, django; \
          os.environ.setdefault('DJANGO_SETTINGS_MODULE', 'core.settings'); \
          django.setup(); \
          from django.contrib.auth.models import User; \
          User.objects.create_superuser('admin', 'admin@example.com', 'admin') \
          if not User.objects.filter(username='admin').exists() else None"
        env:
          DJANGO_SETTINGS_MODULE: core.settings
      
      - name: Build MacOS APP
        run: |
          pyinstaller --noconsole --onedir --icon=assets/icon.icns --paths . \
            --collect-submodules anagrafica \
            --collect-submodules servizi \
            --collect-submodules appuntamenti \
            --collect-submodules cassa \
            --collect-submodules core \
            --collect-submodules gui \
            --add-data "db.sqlite3:." \
            --add-data "assets:assets" \
            --name "GestionaleCentroEstetico" \
            main.py
      
      - name: Comprimi l'app Mac in ZIP
        run: |
          cd dist
          zip -r GestionaleCentroEstetico-Mac.zip GestionaleCentroEstetico.app
      
      - name: Carica il pacchetto Mac
        uses: actions/upload-artifact@v4
        with:
          name: Gestionale-Mac-App
          path: dist/GestionaleCentroEstetico-Mac.zip


  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Scarica artifact Windows
        uses: actions/download-artifact@v4
        with:
          name: Gestionale-Windows-Portable
          path: artifacts/windows

      - name: Scarica artifact Mac
        uses: actions/download-artifact@v4
        with:
          name: Gestionale-Mac-App
          path: artifacts/mac

      - name: Elimina release latest precedente
        run: gh release delete latest --yes --cleanup-tag || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Crea release latest
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: "Latest Build"
          body: "Build automatica dell'ultima versione su main."
          files: |
            artifacts/windows/GestionaleCentroEstetico.exe
            artifacts/mac/GestionaleCentroEstetico-Mac.zip