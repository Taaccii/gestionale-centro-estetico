name: Build Desktop Application (Windows & Mac)

on:
  push:
    branches: [ "main" ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Scarica il codice dal repository
        uses: actions/checkout@v4
      
      - name: Configura Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Installa le dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build Windows EXE
        run: |
          pyinstaller --noconsole --onefile --icon=assets/icon.ico --paths . --collect-submodules core --collect-submodules gui --add-data "db.sqlite3;." --add-data "assets;assets" --name "GestionaleCentroEstetico" main.py
      
      - name: Carica l'eseguibile Windows
        uses: actions/upload-artifact@v4
        with:
          name: Gestionale-Windows-Portable
          path: dist/GestionaleCentroEstetico.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build MacOS APP
        run: |
          pyinstaller --noconsole --onedir --icon=assets/icon.icns --paths . \
            --collect-submodules core \
            --collect-submodules gui \
            --add-data "db.sqlite3:." \
            --add-data "assets:assets" \
            --name "GestionaleCentroEstetico" \
            main.py
      
      - name: Comprimi l'app Mac in ZIP
        run: |
          cd dist
          zip -r GestionaleCentroEstetico-Mac.zip GestionaleCentroEstetico.app
      
      - name: Carica il pacchetto Mac
        uses: actions/upload-artifact@v4
        with:
          name: Gestionale-Mac-App
          path: dist/GestionaleCentroEstetico-Mac.zip