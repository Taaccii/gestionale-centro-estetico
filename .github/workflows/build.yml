name: Build Desktop Application (Windows)
# Questo robot si attiva ogni volta che fai un "push" (carichi codice) su GitHub
on:
  push:
    branches: [ "main" ]
jobs:
  build-windows:
    # Qui diciamo a GitHub: "Dacci un computer con Windows!"
    runs-on: windows-latest
    steps:
    - name: Scarica il codice dal repository
      uses: actions/checkout@v4
    - name: Configura Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'
    - name: Installa le dipendenze
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    - name: Build con PyInstaller (Single File Portable)
      # Qui creiamo l'eseguibile.
      # --onefile: crea un unico file portable
      # --noconsole: non apre la finestra nera del terminale all'avvio
      # --add-data: includiamo il database e gli asset grafici
      run: |
        pyinstaller --noconsole --onefile `
        --add-data "db.sqlite3;." `
        --add-data "assets;assets" `
        --name "GestionaleCentroEstetico" `
        gui/app.py
    - name: Carica l'eseguibile pronto (Artifact)
      # Questo passo prende il file creato e lo mette a tua disposizione per il download
      uses: actions/upload-artifact@v4
      with:
        name: Gestionale-Windows-Portable
        path: dist/GestionaleCentroEstetico.exe